<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>STUDIO · dmitri</title>
<style>
  :root{
    --bg:#0a0e1a; --ink:#e6ecf5; --dim:#8a97ad; --faint:#5a6678;
    --accent:#00d4aa; --accent2:#2dd4ff; --hot:#ff5470; --warm:#f5c451;
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,'DejaVu Sans Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:var(--mono);-webkit-font-smoothing:antialiased;touch-action:none}
  #stage{position:fixed;inset:0;width:100vw;height:100vh;display:block;z-index:0;background:var(--bg)}

  .screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:28px;
    transition:opacity .5s ease;background:rgba(10,14,26,.55)}
  .screen.hidden{opacity:0;pointer-events:none}
  .screen.bare{background:transparent}

  /* landing */
  .logo{font-size:clamp(2.6rem,11vw,6rem);font-weight:700;letter-spacing:.5em;
    text-indent:.5em;color:var(--ink);text-shadow:0 0 40px rgba(0,212,170,.25)}
  .sub{margin-top:18px;color:var(--faint);font-size:clamp(10px,2.4vw,13px);letter-spacing:.28em;text-transform:uppercase}
  .menu{margin-top:54px;display:flex;gap:28px;flex-wrap:wrap;justify-content:center}
  .menu button{font-family:var(--mono);background:transparent;color:var(--dim);
    border:1px solid rgba(255,255,255,.12);padding:16px 34px;letter-spacing:.28em;
    font-size:14px;cursor:pointer;transition:.25s;border-radius:2px}
  .menu button:hover{color:var(--bg);background:linear-gradient(120deg,var(--accent),var(--accent2));
    border-color:transparent;box-shadow:0 0 34px rgba(0,212,170,.45);transform:translateY(-2px)}

  /* list screens */
  .toprow{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;
    justify-content:space-between;padding:20px 24px;gap:14px}
  .h-title{letter-spacing:.4em;font-size:13px;color:var(--dim);text-transform:uppercase}
  .back{font-family:var(--mono);background:transparent;color:var(--faint);border:1px solid rgba(255,255,255,.1);
    padding:8px 14px;font-size:11px;letter-spacing:.18em;cursor:pointer;border-radius:2px;transition:.2s}
  .back:hover{color:var(--ink);border-color:var(--border-hi,rgba(0,212,170,.45))}
  .scroller{width:100%;max-width:1000px;max-height:100%;overflow-y:auto;padding:78px 6px 90px;
    -ms-overflow-style:none;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent}
  .scroller::-webkit-scrollbar{width:8px}.scroller::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12)}

  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
  .pcard{position:relative;border:1px solid rgba(255,255,255,.09);border-radius:4px;overflow:hidden;
    background:linear-gradient(160deg,#0f1524,#0b1120);cursor:pointer;transition:.25s;min-height:150px;
    display:flex;flex-direction:column;justify-content:flex-end}
  .pcard .thumb{position:absolute;inset:0;opacity:.5;background-size:cover;background-position:center}
  .pcard .pc-body{position:relative;padding:16px;background:linear-gradient(transparent,rgba(8,12,22,.92))}
  .pcard .pc-no{font-size:10px;letter-spacing:.2em;color:var(--accent)}
  .pcard .pc-name{font-size:16px;font-weight:700;margin-top:6px;letter-spacing:.02em}
  .pcard .pc-desc{font-size:11px;color:var(--dim);margin-top:6px;line-height:1.5}
  .pcard:hover{border-color:rgba(0,212,170,.5);transform:translateY(-3px);box-shadow:0 16px 40px -20px rgba(0,212,170,.5)}
  .pcard:hover .thumb{opacity:.8}

  .section-label{margin:30px 0 14px;font-size:11px;letter-spacing:.32em;color:var(--faint);text-transform:uppercase}
  .ygrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
  .ycard{border:1px solid rgba(255,255,255,.09);border-radius:4px;overflow:hidden;background:#0d1322;display:flex;flex-direction:column}
  .ycard .yt-thumb{height:108px;background:#06090f;background-size:cover;background-position:center;border-bottom:1px solid rgba(255,255,255,.06)}
  .ycard .yt-b{padding:12px}
  .ycard .yt-name{font-size:14px;font-weight:700}
  .ycard .yt-meta{font-size:10px;color:var(--faint);margin-top:5px;letter-spacing:.06em}
  .ycard .yt-btns{display:flex;gap:6px;margin-top:11px;flex-wrap:wrap}
  .ycard .yt-btns button{flex:1;min-width:54px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;
    padding:7px 4px;background:transparent;border:1px solid rgba(255,255,255,.14);color:var(--dim);cursor:pointer;border-radius:2px;transition:.18s}
  .ycard .yt-btns button:hover{color:var(--ink);border-color:rgba(0,212,170,.5)}
  .ycard .yt-btns button.danger:hover{color:var(--hot);border-color:rgba(255,84,112,.5)}
  .empty-note{color:var(--faint);font-size:12px;letter-spacing:.06em;padding:14px;border:1px dashed rgba(255,255,255,.1);border-radius:4px}

  /* creator mode tabs */
  .modetabs{position:fixed;top:0;left:0;right:0;z-index:14;display:flex;gap:2px;justify-content:center;
    padding:16px;transition:opacity .4s}
  .modetabs button{font-family:var(--mono);background:rgba(10,14,26,.75);border:1px solid rgba(255,255,255,.1);
    color:var(--faint);padding:9px 16px;font-size:11px;letter-spacing:.18em;cursor:pointer;transition:.18s}
  .modetabs button.active{color:var(--bg);background:var(--accent);border-color:transparent}
  .modetabs button:hover{color:var(--ink)}
  .modetabs button.active:hover{color:var(--bg)}

  .hint{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);z-index:12;
    color:var(--faint);font-size:11px;letter-spacing:.1em;text-align:center;pointer-events:none;
    transition:opacity .5s;text-shadow:0 1px 6px #000;max-width:90vw}
  .palette{position:fixed;top:62px;left:50%;transform:translateX(-50%);z-index:13;display:flex;gap:8px;
    padding:8px 10px;background:rgba(10,14,26,.7);border:1px solid rgba(255,255,255,.1);border-radius:3px;transition:opacity .4s}
  .swatch{width:22px;height:22px;border-radius:2px;cursor:pointer;border:2px solid transparent;transition:.15s}
  .swatch.active{border-color:#fff;transform:scale(1.12)}
  .swatch span{display:block;font-size:8px;text-align:center;margin-top:24px;color:var(--faint);letter-spacing:.05em}

  /* phase + arrows for presets */
  .phasebar{position:fixed;bottom:64px;left:0;right:0;z-index:12;text-align:center;pointer-events:none;transition:opacity .5s}
  .phasebar .pname{font-size:12px;letter-spacing:.34em;color:var(--accent);text-transform:uppercase;text-shadow:0 1px 8px #000}
  .phasebar .ptitle{font-size:10px;letter-spacing:.2em;color:var(--faint);margin-top:8px}
  .navarrows button{position:fixed;top:50%;transform:translateY(-50%);z-index:13;background:rgba(10,14,26,.5);
    border:1px solid rgba(255,255,255,.1);color:var(--dim);font-size:26px;width:46px;height:62px;cursor:pointer;transition:.2s}
  .navarrows button:hover{color:var(--ink);background:rgba(0,212,170,.15);border-color:rgba(0,212,170,.4)}
  #prevT{left:16px}#nextT{right:16px}

  /* save button */
  #saveBtn{position:fixed;bottom:22px;right:22px;z-index:14;font-family:var(--mono);
    background:linear-gradient(120deg,var(--accent),var(--accent2));color:var(--bg);border:none;
    padding:12px 20px;font-size:12px;letter-spacing:.18em;cursor:pointer;border-radius:2px;font-weight:700;
    box-shadow:0 8px 28px -10px rgba(0,212,170,.6);transition:.2s}
  #saveBtn:hover{filter:brightness(1.12);transform:translateY(-2px)}

  /* creator bottom toolbar */
  .cbar{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:16;display:flex;gap:8px;
    align-items:center;flex-wrap:wrap;justify-content:center;max-width:94vw;
    background:rgba(10,14,26,.82);border:1px solid rgba(255,255,255,.1);border-radius:3px;padding:7px 9px;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
  .cbtn{font-family:var(--mono);font-size:10px;letter-spacing:.12em;background:transparent;
    border:1px solid rgba(255,255,255,.14);color:var(--dim);padding:8px 12px;cursor:pointer;border-radius:2px;transition:.15s}
  .cbtn:hover{color:var(--ink);border-color:rgba(0,212,170,.5)}
  .cbtn.active{color:var(--bg);background:var(--accent);border-color:transparent}
  .cbtn.danger.active{background:var(--hot);color:#fff}
  .ctools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .cgroup{display:flex;gap:4px;align-items:center;border-left:1px solid rgba(255,255,255,.1);padding-left:8px}
  .clabel{font-size:8px;letter-spacing:.14em;color:var(--faint);text-transform:uppercase;margin-right:2px}
  .cseg{font-family:var(--mono);font-size:9.5px;letter-spacing:.07em;background:transparent;
    border:1px solid rgba(255,255,255,.14);color:var(--dim);padding:6px 9px;cursor:pointer;border-radius:2px;transition:.15s}
  .cseg.active{color:var(--bg);background:var(--accent2);border-color:transparent}
  .cseg:hover{color:var(--ink)}
  .cdot{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.12s}
  .cdot.active{border-color:#fff;transform:scale(1.15)}

  /* persistent player widget */
  #widget{position:fixed;bottom:18px;left:18px;z-index:30;display:flex;align-items:center;gap:10px;
    padding:9px 12px;background:rgba(12,17,30,.92);border:1px solid rgba(255,255,255,.1);
    border-left:2px solid var(--accent);border-radius:2px;backdrop-filter:blur(8px);
    box-shadow:0 8px 26px -14px #000;transition:opacity .3s,transform .3s}
  #widget.hidden{opacity:0;transform:translateY(12px);pointer-events:none}
  #widget .wbtn{background:transparent;border:1px solid rgba(255,255,255,.16);color:var(--dim);
    width:30px;height:30px;cursor:pointer;border-radius:2px;font-size:13px;display:flex;align-items:center;justify-content:center;transition:.16s}
  #widget .wbtn:hover{color:var(--ink);border-color:rgba(0,212,170,.5)}
  #widget .wmeta{display:flex;flex-direction:column;gap:2px;min-width:90px;max-width:170px}
  #widget .wlabel{font-size:8px;letter-spacing:.2em;color:var(--faint);text-transform:uppercase}
  #widget .wname{font-size:12px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* name modal */
  .modal{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
    background:rgba(5,8,15,.82);backdrop-filter:blur(4px);transition:opacity .25s}
  .modal.hidden{opacity:0;pointer-events:none}
  .modal-card{width:min(420px,90vw);background:#0d1322;border:1px solid rgba(255,255,255,.12);
    border-top:2px solid var(--accent);border-radius:3px;padding:24px}
  .modal-card h3{font-size:12px;letter-spacing:.26em;color:var(--dim);text-transform:uppercase;margin-bottom:16px}
  .modal-card input{width:100%;font-family:var(--mono);background:#06090f;border:1px solid rgba(255,255,255,.14);
    color:var(--ink);padding:13px 14px;font-size:15px;letter-spacing:.04em;border-radius:2px;outline:none}
  .modal-card input:focus{border-color:var(--accent)}
  .modal-actions{display:flex;gap:10px;margin-top:18px;justify-content:flex-end}
  .modal-actions button{font-family:var(--mono);padding:10px 18px;font-size:11px;letter-spacing:.16em;cursor:pointer;border-radius:2px;transition:.18s}
  .modal-actions .ok{background:var(--accent);border:none;color:var(--bg);font-weight:700}
  .modal-actions .ok:hover{filter:brightness(1.1)}
  .modal-actions .cancel{background:transparent;border:1px solid rgba(255,255,255,.16);color:var(--dim)}
  .modal-actions .cancel:hover{color:var(--ink)}

  .toast{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);z-index:60;
    background:rgba(12,17,30,.96);border:1px solid rgba(0,212,170,.4);color:var(--ink);
    padding:11px 18px;font-size:12px;letter-spacing:.08em;border-radius:2px;opacity:0;transition:opacity .3s;pointer-events:none}
  .toast.show{opacity:1}

  .chrome-hidden{opacity:0!important;pointer-events:none}
  /* generic hide for floating chrome (screens/widget/modal handle their own .hidden) */
  .modetabs.hidden,.palette.hidden,.navarrows.hidden,.phasebar.hidden,.cbar.hidden,
  #hint.hidden,#saveBtn.hidden,#creatorBack.hidden,#presetBack.hidden{display:none!important}
</style>
</head>
<body>
<canvas id="stage"></canvas>

<!-- LANDING -->
<section id="landing" class="screen">
  <h1 class="logo">STUDIO</h1>
  <div class="sub">by dmitri · hedge fund internship · summer 2026</div>
  <div class="menu">
    <button data-go="presets">PRESETS</button>
    <button data-go="creator">CREATOR</button>
  </div>
</section>

<!-- PRESETS LIST -->
<section id="presets" class="screen hidden">
  <div class="toprow">
    <button class="back" data-back>← BACK</button>
    <span class="h-title">Presets</span>
    <span style="width:64px"></span>
  </div>
  <div class="scroller">
    <div class="pgrid" id="presetGrid"></div>
    <div class="section-label">Your Tracks</div>
    <div class="ygrid" id="yourTracks"></div>
  </div>
</section>

<!-- CREATOR (mode chrome lives outside, this is just the back/tab host) -->
<section id="creator" class="screen bare hidden" style="pointer-events:none"></section>

<!-- creator chrome -->
<div id="modetabs" class="modetabs hidden">
  <button data-mode="gravity">GRAVITY</button>
  <button data-mode="paint">PAINT</button>
  <button data-mode="particles">PARTICLES</button>
  <button data-mode="constellation">CONSTELLATION</button>
</div>
<div id="palette" class="palette hidden"></div>
<button id="creatorBack" class="back hidden" data-back style="position:fixed;top:16px;left:16px;z-index:15">← BACK</button>
<div id="hint" class="hint hidden"></div>
<button id="saveBtn" class="hidden">◆ SAVE TRACK</button>

<!-- creator bottom toolbar: stop/go · delete · per-mode tools -->
<div id="creatorBar" class="cbar hidden">
  <button id="cStop" class="cbtn" title="stop / go (space)">■ STOP</button>
  <button id="cDelete" class="cbtn danger" title="delete mode (Esc exits)">DELETE</button>
  <div id="cTools" class="ctools"></div>
</div>

<!-- preset chrome -->
<div id="navarrows" class="navarrows hidden">
  <button id="prevT">‹</button><button id="nextT">›</button>
</div>
<div id="phasebar" class="phasebar hidden">
  <div class="pname" id="phaseName">—</div>
  <div class="ptitle" id="phaseTitle">—</div>
</div>
<button id="presetBack" class="back hidden" data-back style="position:fixed;top:16px;left:16px;z-index:15">← BACK</button>

<!-- persistent widget -->
<div id="widget" class="hidden">
  <button class="wbtn" id="wPlay" title="pause / resume">⏸</button>
  <div class="wmeta">
    <span class="wlabel">Now Playing</span>
    <span class="wname" id="wName">—</span>
  </div>
  <button class="wbtn" id="wMute" title="mute">🔊</button>
</div>

<!-- name modal -->
<div id="nameModal" class="modal hidden">
  <div class="modal-card">
    <h3>Name your track</h3>
    <input id="nameInput" maxlength="40" placeholder="untitled session" autocomplete="off" spellcheck="false" />
    <div class="modal-actions">
      <button class="cancel" id="nameCancel">CANCEL</button>
      <button class="ok" id="nameOk">SAVE</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
"use strict";
(function(){
/* =====================================================================
   STUDIO — vanilla JS · Web Audio · Canvas. Single file, no deps.
   ===================================================================== */
const $ = s => document.querySelector(s);
const TAU = Math.PI*2;
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const rand=(a,b)=>a+Math.random()*(b-a);
const mtof=m=>440*Math.pow(2,(m-69)/12);
const uuid=()=> (crypto.randomUUID?crypto.randomUUID():'id-'+Date.now()+'-'+Math.random().toString(16).slice(2));

/* ---------- canvas ---------- */
const cv=$('#stage'), g=cv.getContext('2d',{alpha:false});
let W=0,H=0,DPR=1;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth; H=window.innerHeight;
  cv.width=Math.floor(W*DPR); cv.height=Math.floor(H*DPR);
  cv.style.width=W+'px'; cv.style.height=H+'px';
  g.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize',resize); resize();

/* ===================================================================
   AUDIO ENGINE
   =================================================================== */
const Audio={ctx:null,master:null,limiter:null,analyser:null,reverb:null,revGain:null,
  userVol:0.9, muted:false, bg:false, playPaused:false, started:false, freq:new Float32Array(1024)};

function ensureAudio(){
  if(Audio.ctx) { if(Audio.ctx.state==='suspended') Audio.ctx.resume(); return Audio.ctx; }
  const AC=window.AudioContext||window.webkitAudioContext;
  const ctx=new AC();
  Audio.ctx=ctx;
  const master=ctx.createGain(); master.gain.value=effVol();
  const lim=ctx.createDynamicsCompressor();
  lim.threshold.value=-6; lim.knee.value=6; lim.ratio.value=12; lim.attack.value=0.003; lim.release.value=0.25;
  const an=ctx.createAnalyser(); an.fftSize=2048; an.smoothingTimeConstant=0.8;
  Audio.freq=new Float32Array(an.frequencyBinCount);
  master.connect(lim); lim.connect(ctx.destination); master.connect(an);
  // simple algorithmic reverb
  const rev=ctx.createConvolver(); rev.buffer=makeIR(ctx,2.6,2.4);
  const rg=ctx.createGain(); rg.gain.value=0.9; rev.connect(rg); rg.connect(master);
  Audio.master=master; Audio.limiter=lim; Audio.analyser=an; Audio.reverb=rev; Audio.revGain=rg;
  Audio.started=true;
  return ctx;
}
function makeIR(ctx,dur,decay){
  const rate=ctx.sampleRate, len=Math.floor(rate*dur), buf=ctx.createBuffer(2,len,rate);
  for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);
    for(let i=0;i<len;i++){const t=i/len; d[i]=(Math.random()*2-1)*Math.pow(1-t,decay);}}
  return buf;
}
function effVol(){ return (Audio.muted||Audio.playPaused)?0:(Audio.userVol*(Audio.bg?0.15:1)); }
function applyVol(t){ if(Audio.master) Audio.master.gain.setTargetAtTime(effVol(), (Audio.ctx?Audio.ctx.currentTime:0), 0.05); }

let noiseBuf=null;
function noiseBuffer(){ if(noiseBuf)return noiseBuf; const ctx=Audio.ctx; const len=ctx.sampleRate*2;
  noiseBuf=ctx.createBuffer(1,len,ctx.sampleRate); const d=noiseBuf.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=Math.random()*2-1; return noiseBuf; }

/* synth primitives ------------------------------------------------- */
function voice(opt){
  // opt: type,freq,t,dur,attack,decay,sustain,release,gain,dest,detune,glide,pan,reverb
  const ctx=Audio.ctx, t=opt.t!=null?opt.t:ctx.currentTime;
  const o=ctx.createOscillator(); o.type=opt.type||'sine';
  o.frequency.setValueAtTime(opt.freq,t);
  if(opt.glide) o.frequency.exponentialRampToValueAtTime(Math.max(1,opt.glide), t+(opt.dur||0.5));
  if(opt.detune) o.detune.value=opt.detune;
  const a=opt.attack!=null?opt.attack:0.01, rel=opt.release!=null?opt.release:0.2;
  const dur=opt.dur!=null?opt.dur:0.5, pk=opt.gain!=null?opt.gain:0.2;
  const sus=opt.sustain!=null?opt.sustain:pk;
  const env=ctx.createGain();
  env.gain.setValueAtTime(0,t);
  env.gain.linearRampToValueAtTime(pk,t+a);
  env.gain.linearRampToValueAtTime(sus, t+a+(opt.decay||0.05));
  env.gain.setValueAtTime(sus, t+Math.max(a+0.06,dur));
  env.gain.linearRampToValueAtTime(0.0001, t+dur+rel);
  let node=env;
  if(opt.pan!=null){const p=ctx.createStereoPanner?ctx.createStereoPanner():null; if(p){p.pan.value=opt.pan; env.connect(p); node=p;}}
  o.connect(env);
  const dest=opt.dest||Audio.master; node.connect(dest);
  if(opt.reverb){const s=ctx.createGain(); s.gain.value=opt.reverb; node.connect(s); s.connect(Audio.reverb);}
  o.start(t); o.stop(t+dur+rel+0.05);
  return {o,env};
}
function fm(opt){ // carrier+modulator bell/pluck
  const ctx=Audio.ctx,t=opt.t,dur=opt.dur||0.6;
  const car=ctx.createOscillator(),mod=ctx.createOscillator(),mg=ctx.createGain(),env=ctx.createGain();
  car.type='sine'; mod.type='sine';
  car.frequency.value=opt.freq; mod.frequency.value=opt.freq*(opt.ratio||2);
  mg.gain.setValueAtTime(opt.freq*(opt.index||3),t); mg.gain.exponentialRampToValueAtTime(1,t+dur);
  mod.connect(mg); mg.connect(car.frequency);
  const pk=opt.gain!=null?opt.gain:0.18;
  env.gain.setValueAtTime(0,t); env.gain.linearRampToValueAtTime(pk,t+0.005);
  env.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  car.connect(env); env.connect(opt.dest||Audio.master);
  if(opt.reverb){const s=ctx.createGain(); s.gain.value=opt.reverb; env.connect(s); s.connect(Audio.reverb);}
  car.start(t);mod.start(t);car.stop(t+dur+0.05);mod.stop(t+dur+0.05);
}
function hit(opt){ // noise percussion
  const ctx=Audio.ctx,t=opt.t,dur=opt.dur||0.12;
  const src=ctx.createBufferSource(); src.buffer=noiseBuffer();
  const f=ctx.createBiquadFilter(); f.type=opt.filter||'highpass'; f.frequency.value=opt.cut||4000; f.Q.value=opt.q||0.7;
  const env=ctx.createGain(); const pk=opt.gain!=null?opt.gain:0.3;
  env.gain.setValueAtTime(pk,t); env.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  src.connect(f); f.connect(env); env.connect(opt.dest||Audio.master);
  if(opt.reverb){const s=ctx.createGain(); s.gain.value=opt.reverb; env.connect(s); s.connect(Audio.reverb);}
  src.start(t); src.stop(t+dur+0.03);
}
function kick(t,gain){ const ctx=Audio.ctx; const o=ctx.createOscillator(),e=ctx.createGain();
  o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(45,t+0.12);
  e.gain.setValueAtTime(gain||0.6,t); e.gain.exponentialRampToValueAtTime(0.0001,t+0.22);
  o.connect(e); e.connect(Audio.master); o.start(t); o.stop(t+0.24); }

/* persistent voice (creator continuous tones) */
function makeOscVoice(type){
  const ctx=ensureAudio();
  const o=ctx.createOscillator(), gain=ctx.createGain(), pan=ctx.createStereoPanner?ctx.createStereoPanner():null;
  o.type=type||'sine'; gain.gain.value=0;
  o.connect(gain); if(pan){gain.connect(pan); pan.connect(Audio.master);} else gain.connect(Audio.master);
  o.start();
  return {o,gain,pan,stop(){try{o.stop();}catch(e){} try{o.disconnect();gain.disconnect();if(pan)pan.disconnect();}catch(e){}}};
}

let scene=null;          // active scene object
let paused=false;
let lastFrame=performance.now();
const SCALE_MIN=[0,2,3,5,7,8,10], SCALE_MAJ=[0,2,4,5,7,9,11], PENTA=[0,3,5,7,10], PENTA_MAJ=[0,2,4,7,9];

function setScene(next, meta){
  if(scene&&scene.teardown) try{scene.teardown();}catch(e){}
  scene=next;
  paused=false;
  if(scene){ scene._t=0; scene._audioNext=0;
    if(scene.init) scene.init();
    nowPlaying(meta||{name:scene.displayName||'—'});
  }
}
function clearScene(){ if(scene&&scene.teardown)try{scene.teardown();}catch(e){} scene=null; hideWidget(); }

function frame(now){
  let dt=(now-lastFrame)/1000; lastFrame=now; if(dt>0.05)dt=0.05;
  if(scene){
    if(!paused){ scene._t+=dt;
      if(scene.audio && Audio.ctx){
        const look=Audio.ctx.currentTime+0.18;
        if(scene._audioNext<Audio.ctx.currentTime) scene._audioNext=Audio.ctx.currentTime+0.05;
        while(scene._audioNext<look){ scene.audio(scene._audioNext); scene._audioNext+=scene.step; }
      }
    }
    if(scene.draw) scene.draw(g, scene._t, dt, paused);
  } else {
    g.fillStyle='#0a0e1a'; g.fillRect(0,0,W,H);
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

function setPaused(p){
  paused=p;
  Audio.playPaused=p;          // force master output silent on pause (reliable stop)
  applyVol();
  if(scene&&scene.onPause) scene.onPause(p);
  $('#wPlay').textContent=paused?'▶':'⏸';
  const sb=document.getElementById('cStop'); if(sb){ sb.textContent=paused?'▶ GO':'■ STOP'; sb.classList.toggle('active',paused); }

   =================================================================== */
function phase(elapsed, bounds){ // bounds: [[name,endSec],...]; loops
  const total=bounds[bounds.length-1][1];
  const e=elapsed%total;
  for(const [n,end] of bounds){ if(e<end) return {name:n,e,total}; }
  return {name:bounds[0][0],e,total};
}
function setPhaseLabel(name,title){ $('#phaseName').textContent=name; $('#phaseTitle').textContent=title; }

/* ---- Track 1: Market Open (tense cinematic build) ---- */
function presetMarketOpen(){
  const root=45; const beat=0.6;                          // A minor, ~100bpm
  const bounds=[['pre-market',20],['opening bell',35],['volatility spike',60],['midday calm',85]];
  let sub=null;
  let bars=new Array(60).fill(0);
  let stars=[]; for(let i=0;i<90;i++)stars.push({x:Math.random(),y:Math.random(),b:rand(0.4,1),tw:rand(0,TAU)});
  // skyline (normalized); windows are fractions of each building
  let skyline=[]; { let x=0; while(x<1.02){ const w=rand(0.022,0.055), h=rand(0.10,0.34), win=[];
      for(let wy=0.10;wy<0.92;wy+=0.13) for(let wx=0.18;wx<0.85;wx+=0.30){ if(Math.random()<0.7)win.push({wx,wy,on:Math.random()<0.5}); }
      skyline.push({x,w,h,win}); x+=w+rand(0.002,0.010); } }
  return {
    kind:'preset', id:'market', displayName:'Market Open', step:beat/4,
    init(){ ensureAudio(); sub=makeOscVoice('sine'); sub.o.frequency.value=mtof(root-24); sub.gain.gain.value=0; this._subg=0; this._bell=false; },
    onPause(p){ if(sub) sub.gain.gain.setTargetAtTime(p?0:(this._subg||0),Audio.ctx.currentTime,0.1); },
    teardown(){ if(sub)sub.stop(); sub=null; },
    audio(t){
      const ph=phase(this._t,bounds); const local=ph.e; const six=Math.round(t/(beat/4)); const ns=six!==this._l6; if(ns)this._l6=six;
      const si=((six%64)+64)%64;
      if(ph.name==='pre-market'){
        const g=lerp(0.015,0.17, clamp(local/20,0,1)); this._subg=g; if(sub)sub.gain.gain.setTargetAtTime(g,t,0.3);   // sub-bass slowly rising
        if(Math.random()<0.02){ const sc=SCALE_MIN; fm({t,freq:mtof(root+24+sc[(Math.random()*sc.length|0)]),ratio:2,index:2.5,dur:2.6,gain:0.13,reverb:0.7}); } // sparse high piano, long decay
      } else if(ph.name==='opening bell'){
        this._subg=0.10; if(sub)sub.gain.gain.setTargetAtTime(0.10,t,0.3);
        if(!this._bell){ this._bell=true; fm({t:t+0.02,freq:mtof(root+24),ratio:3.5,index:8,dur:1.8,gain:0.24,reverb:0.6}); hit({t:t+0.02,cut:2200,filter:'bandpass',q:3,gain:0.32,dur:0.35,reverb:0.4}); } // the bell
        if(ns && six%4===0) voice({type:'sawtooth',freq:mtof(root-12),t,dur:beat*0.55,gain:0.16,attack:0.005,release:0.08}); // 4/4 bass pulse
        if(ns && six%4===2) voice({type:'sawtooth',freq:mtof(root-12),t,dur:beat*0.4,gain:0.10,attack:0.005,release:0.08});
        if(ns){ const sc=SCALE_MIN, deg=si%sc.length, oct=12*Math.floor((si%(sc.length*2))/sc.length); voice({type:'triangle',freq:mtof(root+12+sc[deg]+oct),t,dur:0.14,gain:0.075,attack:0.004,release:0.08,pan:rand(-0.3,0.3),reverb:0.2}); } // climbing arp
      } else if(ph.name==='volatility spike'){
        this._bell=false; this._subg=0.07; if(sub)sub.gain.gain.setTargetAtTime(0.07,t,0.2);
        if(ns && six%4===0) kick(t,0.75);
        if(ns && six%2===0) voice({type:'sawtooth',freq:mtof(root-12),t,dur:beat*0.45,gain:0.15,attack:0.005,release:0.06});
        if(ns && six%4===2) hit({t,cut:3200,filter:'highpass',q:1,gain:0.20,dur:0.13,reverb:0.2});   // snare on offbeats
        if(ns){ const sc=SCALE_MIN, n=root+12+sc[(Math.random()*sc.length|0)]+12*(Math.random()<0.4?1:0); voice({type:'sawtooth',freq:mtof(n),t,dur:0.12,gain:0.11,attack:0.004,release:0.06,pan:rand(-0.7,0.7)}); } // chaotic arps
        if(ns && six%8===0){ [0,3,6,10].forEach(iv=>voice({type:'square',freq:mtof(root+iv),t,dur:0.32,gain:0.06,attack:0.005,release:0.12,reverb:0.2})); } // dissonant stabs
      } else {
        this._bell=false; this._subg=0.035; if(sub)sub.gain.gain.setTargetAtTime(0.035,t,0.5);
        if(ns && six%16===0){ [0,4,7,11].forEach((iv,k)=>voice({type:'sine',freq:mtof(root+12+iv),t,dur:4.2,gain:0.05,attack:0.9,release:1.6,reverb:0.6,pan:lerp(-0.3,0.3,k/3)})); } // sustained major pad — resolution
        if(Math.random()<0.025){ const sc=PENTA_MAJ; fm({t,freq:mtof(root+24+sc[(Math.random()*sc.length|0)]),ratio:2,index:1.4,dur:2.2,gain:0.07,reverb:0.7}); } // gentle high notes
      }
    },
    draw(g,t){
      const ph=phase(t,bounds); const nm=ph.name; setPhaseLabel(nm,'Market Open');
      // sky gradient driven by phase
      let topC, botC;
      if(nm==='pre-market'){ topC=[2,4,10]; botC=[10,20,48]; }
      else if(nm==='opening bell'){ topC=[10,16,36]; botC=[40,30,16]; }
      else if(nm==='volatility spike'){ topC=[10,6,9]; botC=[30,10,14]; }
      else { topC=[28,22,10]; botC=[70,48,18]; }   // amber
      const sky=g.createLinearGradient(0,0,0,H); sky.addColorStop(0,`rgb(${topC.join(',')})`); sky.addColorStop(1,`rgb(${botC.join(',')})`); g.fillStyle=sky; g.fillRect(0,0,W,H);
      // stars fade as market opens
      const starA = nm==='pre-market'?0.85:(nm==='opening bell'?0.3:0.05);
      stars.forEach(s=>{ s.tw+=0.02; g.fillStyle=`rgba(200,215,255,${(0.25+0.3*Math.sin(s.tw))*starA*s.b})`; g.fillRect(s.x*W,s.y*H*0.62,1.4,1.4); });
      // opening-bell flash of light at the horizon
      if(nm==='opening bell'){ const lf=clamp(1-(ph.e-20)/5,0,1); if(lf>0){ const fg=g.createRadialGradient(W/2,H*0.74,0,W/2,H*0.74,W*0.75);
        fg.addColorStop(0,`rgba(255,225,160,${0.55*lf})`); fg.addColorStop(1,'rgba(255,225,160,0)'); g.fillStyle=fg; g.fillRect(0,0,W,H); } }
      // candlesticks (volatility) / gentle wave (calm) / faint (pre)
      const N=bars.length, bw=W/N;
      for(let i=0;i<N;i++){ let target, ease;
        if(nm==='volatility spike'){ target=rand(0.12,0.9); ease=0.4; }
        else if(nm==='midday calm'){ target=0.26+0.13*Math.sin(t*1.1+i*0.4); ease=0.08; }
        else if(nm==='opening bell'){ target=rand(0.08,0.38); ease=0.18; }
        else { target=rand(0.02,0.1); ease=0.06; }
        bars[i]+=(target*H*0.55-bars[i])*ease;
        let col;
        if(nm==='volatility spike') col=(i%2===0)?'rgba(0,212,140,0.82)':'rgba(255,70,90,0.82)';
        else if(nm==='midday calm') col='rgba(245,196,110,0.5)';
        else col='rgba(80,120,180,0.4)';
        g.fillStyle=col; g.fillRect(i*bw+1, H-bars[i], bw-2, bars[i]);
      }
      // skyline silhouette + lit windows
      const lit = nm==='pre-market'?0.06:(nm==='opening bell'?0.75:(nm==='volatility spike'?0.4:0.55));
      for(const b of skyline){ const bx=b.x*W, bw2=b.w*W, bh=b.h*H;
        g.fillStyle='#04060d'; g.fillRect(bx, H-bh, bw2, bh);
        for(const win of b.win){ const on = win.on || nm==='opening bell' || nm==='volatility spike';
          g.fillStyle=`rgba(255,210,120,${on?lit:lit*0.2})`; g.fillRect(bx+win.wx*bw2, H-bh+win.wy*bh, 2, 2); } }
    }
  };
}

/* ---- Track 2: After Hours ---- */
function presetAfterHours(){
  const root=38; // D
  const bounds=[['close',14],['drift',34],['deep',58],['dawn',80]];
  let pads=[], parts=[];
  for(let i=0;i<80;i++)parts.push({x:Math.random(),y:Math.random(),s:rand(0.2,1),v:rand(0.01,0.04)});
  let ripples=[];
  return {
    kind:'preset', id:'afterhours', displayName:'After Hours', step:0.5,
    init(){ ensureAudio(); pads=[makeOscVoice('sine'),makeOscVoice('triangle'),makeOscVoice('sine')];
      const ch=[root,root+10,root+12+5]; pads.forEach((p,i)=>{p.o.frequency.value=mtof(ch[i]); p.gain.gain.value=0;
        const s=Audio.ctx.createGain(); s.gain.value=0.5; p.gain.connect(s); s.connect(Audio.reverb);});
    },
    onPause(p){ pads.forEach(pd=>pd.gain.gain.setTargetAtTime(p?0:0.06,Audio.ctx.currentTime,0.3)); },
    teardown(){ pads.forEach(p=>p.stop()); pads=[]; },
    audio(t){
      const ph=phase(this._t,bounds);
      pads.forEach((p,i)=>{ const base=ph.name==='deep'?0.085:0.055; p.gain.gain.setTargetAtTime(base*(i===2?0.6:1),t,0.6); });
      // subtle pulse
      const pulse=Math.round(t/2); if(pulse!==this._lp){this._lp=pulse; voice({type:'sine',freq:mtof(root-12),t,dur:1.4,gain:0.07,attack:0.4,release:1.0});}
      // occasional high piano note -> reverb
      if(Math.random()<0.06){ const sc=SCALE_MIN,n=root+24+sc[(Math.random()*sc.length|0)];
        fm({t,freq:mtof(n),ratio:2,index:2.5,dur:2.6,gain:0.12,reverb:0.85}); if(Math.random()<0.5)ripples.push({r:0,a:0.5}); }
    },
    draw(g,t){ const ph=phase(t,bounds); const nm=ph.name; setPhaseLabel(nm,'After Hours');
      // deep navy / midnight-purple; dawn suggests pre-dawn lightening
      const sky=g.createLinearGradient(0,0,0,H);
      if(nm==='dawn'){ sky.addColorStop(0,'#0a0a1c'); sky.addColorStop(1,'#241a34'); }
      else if(nm==='deep'){ sky.addColorStop(0,'#020308'); sky.addColorStop(1,'#070514'); }
      else { sky.addColorStop(0,'#04060f'); sky.addColorStop(1,'#0b0820'); }
      g.fillStyle=sky; g.fillRect(0,0,W,H);
      // ember/star particles drifting upward (slower as it deepens)
      const slow = nm==='deep'?0.5 : nm==='dawn'?0.7 : 1;
      for(const p of parts){ p.y-=p.v*0.01*slow; if(p.y<-0.02){p.y=1.02;p.x=Math.random();}
        const x=p.x*W,y=p.y*H; const c = nm==='dawn'?'rgba(255,200,170,':'rgba(150,180,255,';
        g.fillStyle=c+(0.14*p.s)+')'; g.beginPath(); g.arc(x,y,2.2*p.s+0.6,0,TAU); g.fill(); }
      // concentric ripples — rarer & larger as it deepens
      const rate = nm==='deep'?0.0014 : nm==='drift'?0.003 : nm==='dawn'?0.004 : 0.0035;
      if(Math.random()<rate) ripples.push({r:0,a:0.4,mx:nm==='deep'?1.7:1});
      ripples=ripples.filter(rp=>{ rp.r+=1.1*(rp.mx||1); rp.a*=0.99;
        g.strokeStyle=`rgba(120,150,235,${rp.a})`; g.lineWidth=1.2; g.beginPath(); g.arc(W/2,H/2,rp.r,0,TAU); g.stroke();
        return rp.a>0.015 && rp.r<Math.max(W,H);});
      const glow=g.createRadialGradient(W/2,H*0.55,0,W/2,H*0.55,Math.max(W,H)*0.6);
      glow.addColorStop(0, nm==='dawn'?'rgba(70,45,90,0.16)':'rgba(28,40,82,0.12)'); glow.addColorStop(1,'rgba(4,6,15,0)');
      g.fillStyle=glow; g.fillRect(0,0,W,H);
    }
  };
}

      const s=Audio.ctx.createGain(); s.gain.value=0.6; this._pad.gain.connect(s); s.connect(Audio.reverb); this._pad.gain.gain.value=0.04;
      this._arp=0; },

    teardown(){ if(this._pad)this._pad.stop(); },
    rates(t){ const seg=(t/PHD), i=Math.floor(seg)%snaps.length, j=(i+1)%snaps.length, f=seg-Math.floor(seg);
      const r=[]; for(let k=0;k<11;k++)r.push(lerp(snaps[i].r[k],snaps[j].r[k],f)); return {r,i,j,f}; },

      const inv=cur[8]-cur[4]; // 10y-2y
      voice({type: inv<0?'sawtooth':'triangle', freq:mtof(midi), t, dur:0.42, gain:0.12, attack:0.01, release:0.3, reverb:0.45, pan:lerp(-0.7,0.7,k/10)});

/* ---- Track 4: Trading Floor ---- */
function presetTradingFloor(){
  const bpm=122, beat=60/bpm; const root=48;
  const bounds=[['open outcry',16],['algo surge',34],['flash',46],['settle',66]];
  let flash=0;
  const SYMS=['SPY','QQQ','AAPL','TSLA','NVDA','MSFT','AMD','BTC','ES','VIX','GLD','TLT','META','AMZN'];
  function tick(){ const chg=+(rand(-3.5,3.5)).toFixed(1);
    return {sym:SYMS[SYMS.length*Math.random()|0], price:rand(20,640).toFixed(2), chg:(chg>=0?'+':'')+chg+'%', up:chg>=0}; }
  let tickers=[]; for(let i=0;i<13;i++)tickers.push({x:rand(0,1),y:rand(0.06,0.9),v:rand(0.04,0.12),t:tick()});
  let book=[]; for(let i=0;i<16;i++)book.push({y:rand(0.45,1.05),side:i%2,price:(410+rand(-8,8)).toFixed(2),size:(rand(1,60)|0)});
  return {
    kind:'preset', id:'floor', displayName:'Trading Floor', step:beat/4,
    init(){ ensureAudio(); this._bass=makeOscVoice('sawtooth'); this._bass.gain.gain.value=0; this._bass.o.frequency.value=mtof(root-12);
      const f=Audio.ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=400; },
    onPause(p){ if(this._bass)this._bass.gain.gain.setTargetAtTime(0,Audio.ctx.currentTime,0.1); },
    teardown(){ if(this._bass)this._bass.stop(); },
    audio(t){ const ph=phase(this._t,bounds); const six=Math.round(t/(beat/4));
      if(six===this._l6)return; this._l6=six;
      const driving=ph.name!=='settle';
      // bass pulse (8ths)
      if(six%2===0 && driving){ const n=root-12+[0,0,7,5][(six/2)%4|0]; voice({type:'sawtooth',freq:mtof(n),t,dur:beat*0.5,gain:0.16,attack:0.005,release:0.06,cut:300});}
      // kick on quarter
      if(six%4===0 && driving) kick(t,0.6);
      // hats
      if(driving && six%2===1) hit({t,cut:9000,gain:ph.name==='algo surge'?0.12:0.08,dur:0.04});
      if(ph.name==='flash' && six%1===0) hit({t,cut:6000,gain:0.14,dur:0.05});
      // lead riff (major penta)
      if(driving && Math.random()<(ph.name==='algo surge'?0.7:0.4)){
        const sc=PENTA_MAJ, n=root+12+sc[(Math.random()*sc.length|0)]; voice({type:'square',freq:mtof(n),t,dur:beat*0.5,gain:0.08,attack:0.005,release:0.1,pan:rand(-0.5,0.5),reverb:0.2});}
      if(ph.name==='flash' && Math.random()<0.2) flash=1;
      this._bass.gain.gain.setTargetAtTime(driving?0.06:0.0,t,0.2);
    },
    draw(g,t){ const ph=phase(t,bounds); const nm=ph.name; setPhaseLabel(nm,'Trading Floor');
      g.fillStyle='rgba(5,8,12,0.5)'; g.fillRect(0,0,W,H);
      // neon grid (faster on algo surge)
      g.strokeStyle='rgba(0,212,170,0.08)'; g.lineWidth=1; const gs=40; const sp=nm==='algo surge'?64:30;
      for(let x=(t*sp)%gs;x<W;x+=gs){g.beginPath();g.moveTo(x,0);g.lineTo(x,H);g.stroke();}
      for(let y=0;y<H;y+=gs){g.beginPath();g.moveTo(0,y);g.lineTo(W,y);g.stroke();}
      // oscilloscope — phase drives amplitude/wildness
      const amp = nm==='algo surge'?0.44 : nm==='flash'?0.5 : nm==='settle'?0.12 : 0.28;
      if(Audio.analyser){ const buf=new Uint8Array(Audio.analyser.fftSize); Audio.analyser.getByteTimeDomainData(buf);
        g.lineWidth=2; g.strokeStyle=nm==='flash'?'#fff':'#00e6a0'; g.shadowBlur=12; g.shadowColor='#00d4aa';
        g.beginPath(); for(let i=0;i<buf.length;i+=2){const x=i/buf.length*W; const wob=nm==='algo surge'?Math.sin(i*0.35+t*22)*6:0; const y=H/2+(buf[i]-128)/128*H*amp+wob; i?g.lineTo(x,y):g.moveTo(x,y);} g.stroke(); g.shadowBlur=0; }
      // edge tickers — "SPY 412.33 +1.2%"
      g.font='11px ui-monospace';
      for(const tk of tickers){ tk.x-=tk.v*0.004; if(tk.x<-0.28){tk.x=1.14;tk.y=rand(0.06,0.9);tk.t=tick();}
        const o=tk.t, x=tk.x*W, y=tk.y*H, head=o.sym+' '+o.price+' ';
        g.fillStyle='rgba(200,215,235,0.7)'; g.fillText(head, x, y);
        g.fillStyle=o.up?'rgba(0,212,140,0.85)':'rgba(255,80,100,0.85)'; g.fillText(o.chg, x+g.measureText(head).width, y); }
      // order book scrolling upward (bottom-left)
      g.font='10px ui-monospace';
      for(const r of book){ r.y-=0.0016; if(r.y<-0.05){ r.y=1.06; r.side=(r.side+1)&1; r.price=(410+rand(-8,8)).toFixed(2); r.size=(rand(1,60)|0); }
        const y=r.y*H; if(y<H*0.34)continue; const bid=r.side===0;
        g.fillStyle=bid?'rgba(0,200,130,0.12)':'rgba(255,80,100,0.12)'; g.fillRect(11, y-9, 6+r.size*1.3, 11);
        g.fillStyle=bid?'rgba(0,210,140,0.6)':'rgba(255,90,110,0.6)'; g.fillText((bid?'BID ':'ASK ')+r.price+'  x'+r.size, 14, y); }
      // flash crash (triggered in audio during flash phase)
      if(flash>0){ g.fillStyle=`rgba(255,255,255,${flash*0.7})`; g.fillRect(0,0,W,H); flash*=0.86; if(flash<0.02)flash=0; }
    }
  };
}

function hexA(hex,a){ const h=hex.replace('#',''); const r=parseInt(h.substr(0,2),16),gg=parseInt(h.substr(2,2),16),bb=parseInt(h.substr(4,2),16); return `rgba(${r},${gg},${bb},${a})`; }

// one-shot note, distinct character per instrument
function instNote(id, midi, t, gain, opts){
  opts=opts||{}; gain=gain==null?1:gain; const dest=opts.dest, pan=opts.pan;
  if(id==='synth')      voice({type:'sawtooth',freq:mtof(midi),t,dur:opts.dur||0.35,gain:0.10*gain,attack:0.008,release:0.18,reverb:0.18,dest,pan});
  else if(id==='piano') fm({t,freq:mtof(midi),ratio:2,index:3,dur:opts.dur||0.8,gain:0.17*gain,reverb:0.28,dest});
  else if(id==='bass')  voice({type:'triangle',freq:mtof(midi-12),t,dur:opts.dur||0.4,gain:0.20*gain,attack:0.004,release:0.16,dest,pan});
  else if(id==='bells') fm({t,freq:mtof(midi+12),ratio:3.5,index:5,dur:opts.dur||1.3,gain:0.12*gain,reverb:0.6,dest});
  else if(id==='pad')   voice({type:'sine',freq:mtof(midi),t,dur:opts.dur||1.5,gain:0.09*gain,attack:0.3,release:0.9,reverb:0.5,dest,pan});
  else                  { voice({type:'sawtooth',freq:mtof(midi),t,dur:opts.dur||1.1,gain:0.055*gain,attack:0.18,release:0.5,reverb:0.4,detune:-7,dest,pan});
                          voice({type:'sawtooth',freq:mtof(midi),t,dur:opts.dur||1.1,gain:0.055*gain,attack:0.2,release:0.5,detune:7,dest}); }
}
// sustained voice (gravity orbs, constellation hum)
function instVoice(id){
  const ctx=ensureAudio(); const g=ctx.createGain(); g.gain.value=0;
  const pan=ctx.createStereoPanner?ctx.createStereoPanner():null;
  if(pan){g.connect(pan); pan.connect(Audio.master);} else g.connect(Audio.master);
  const oscs=[]; const mk=(type,det,mul)=>{ const o=ctx.createOscillator(); o.type=type; if(det)o.detune.value=det; o._mul=mul||1; o.connect(g); o.start(); oscs.push(o); return o; };
  if(id==='synth') mk('sawtooth',0);
  else if(id==='piano') mk('triangle',0);
  else if(id==='bass') mk('sine',0,0.5);
  else if(id==='bells'){ mk('sine',0); mk('sine',0,2.5); }
  else if(id==='pad'){ mk('sine',0); mk('sine',7); }
  else if(id==='strings'){ mk('sawtooth',-9); mk('sawtooth',9); }
  else mk('sine',0);
  if(id==='pad'||id==='bells'||id==='strings'){ const s=ctx.createGain(); s.gain.value=0.45; g.connect(s); s.connect(Audio.reverb); }
  return {
    setFreq(f){ oscs.forEach(o=>o.frequency.setTargetAtTime(f*(o._mul||1),ctx.currentTime,0.08)); },
    setGain(v){ g.gain.setTargetAtTime(v,ctx.currentTime,0.07); },
    setPan(p){ if(pan)pan.pan.setTargetAtTime(p,ctx.currentTime,0.1); },
    stop(){ try{oscs.forEach(o=>o.stop());}catch(e){} try{oscs.forEach(o=>o.disconnect()); g.disconnect(); if(pan)pan.disconnect();}catch(e){} }
  };
}

// shared creator tools (walls + repulsion fields + delete mode)
const Creator={ deleteMode:false, walls:[], fields:[], draft:null };
function creatorReset(){ Creator.deleteMode=false; Creator.walls=[]; Creator.fields=[]; Creator.draft=null; }
function _cross(ax,ay,bx,by,px,py){ return (bx-ax)*(py-ay)-(by-ay)*(px-ax); }
function _segCross(ax,ay,bx,by,cx,cy,dx,dy){
  const d1=_cross(cx,cy,dx,dy,ax,ay), d2=_cross(cx,cy,dx,dy,bx,by), d3=_cross(ax,ay,bx,by,cx,cy), d4=_cross(ax,ay,bx,by,dx,dy);
  return ((d1>0&&d2<0)||(d1<0&&d2>0)) && ((d3>0&&d4<0)||(d3<0&&d4>0));
}
// circle-vs-segment with swept (prev->cur) tunnel detection; restitution ~0.8
function reflectOffWalls(o){
  for(const w of Creator.walls){
    const wx=w.x2-w.x1, wy=w.y2-w.y1, wlen2=wx*wx+wy*wy||1;
    const rad=(o.r||6)+2;
    let tt=clamp(((o.x-w.x1)*wx+(o.y-w.y1)*wy)/wlen2,0,1);
    const cx=w.x1+tt*wx, cy=w.y1+tt*wy; let nx=o.x-cx, ny=o.y-cy; let dist=Math.hypot(nx,ny);
    let hit = dist<rad;
    if(!hit && o.px!=null && _segCross(o.px,o.py,o.x,o.y, w.x1,w.y1,w.x2,w.y2)) hit=true;   // tunneled through
    if(!hit) continue;
    // normal points back toward the side the object came from (prev position)
    const px=(o.px!=null?o.px:o.x), py=(o.py!=null?o.py:o.y);
    const ttp=clamp(((px-w.x1)*wx+(py-w.y1)*wy)/wlen2,0,1);
    const cpx=w.x1+ttp*wx, cpy=w.y1+ttp*wy; let bnx=px-cpx, bny=py-cpy; let bnd=Math.hypot(bnx,bny);
    if(bnd<0.001){ bnx=-wy; bny=wx; bnd=Math.hypot(bnx,bny)||1; }
    const ux=bnx/bnd, uy=bny/bnd;
    o.x=cx+ux*rad; o.y=cy+uy*rad;
    const vn=o.vx*ux+o.vy*uy; if(vn<0){ o.vx-=1.8*vn*ux; o.vy-=1.8*vn*uy; }   // -1.8*vn => ~0.8 restitution
    o._wallHit=true;
  }
}
function wallAt(x,y){ for(let i=Creator.walls.length-1;i>=0;i--){ const w=Creator.walls[i];
  const dx=w.x2-w.x1,dy=w.y2-w.y1,len2=dx*dx+dy*dy||1; const tt=clamp(((x-w.x1)*dx+(y-w.y1)*dy)/len2,0,1);
  const cx=w.x1+tt*dx,cy=w.y1+tt*dy; if(Math.hypot(x-cx,y-cy)<11)return i; } return -1; }
function fieldAt(x,y){ for(let i=Creator.fields.length-1;i>=0;i--){ const f=Creator.fields[i];
  if(f.kind==='line'){ const wx=f.x2-f.x1,wy=f.y2-f.y1,len2=wx*wx+wy*wy||1; const tt=clamp(((x-f.x1)*wx+(y-f.y1)*wy)/len2,0,1); const cx=f.x1+tt*wx,cy=f.y1+tt*wy; if(Math.hypot(x-cx,y-cy)<30)return i; }
  else if(Math.hypot(x-f.x,y-f.y)<f.r)return i; } return -1; }
function drawWalls(g){ g.lineCap='round';
  for(const w of Creator.walls){ g.strokeStyle='rgba(120,140,180,0.32)'; g.lineWidth=4; g.beginPath(); g.moveTo(w.x1,w.y1); g.lineTo(w.x2,w.y2); g.stroke(); }
  for(const f of Creator.fields){
    if(f.kind==='line'){ g.strokeStyle='rgba(255,120,80,0.10)'; g.lineWidth=110; g.beginPath(); g.moveTo(f.x1,f.y1); g.lineTo(f.x2,f.y2); g.stroke();
      g.strokeStyle='rgba(255,150,95,0.6)'; g.lineWidth=2; g.beginPath(); g.moveTo(f.x1,f.y1); g.lineTo(f.x2,f.y2); g.stroke(); }
    else { g.strokeStyle='rgba(255,120,80,0.18)'; g.lineWidth=1.5; g.beginPath(); g.arc(f.x,f.y,f.r,0,TAU); g.stroke();
      const rg=g.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r); rg.addColorStop(0,'rgba(255,120,80,0.0)'); rg.addColorStop(1,'rgba(255,120,80,0.08)'); g.fillStyle=rg; g.beginPath(); g.arc(f.x,f.y,f.r,0,TAU); g.fill(); }
  }
  const d=Creator.draft;
  if(d&&d.kind==='wall'){ g.strokeStyle='rgba(150,180,220,0.6)'; g.lineWidth=4; g.setLineDash([6,5]); g.beginPath(); g.moveTo(d.x1,d.y1); g.lineTo(d.x2,d.y2); g.stroke(); g.setLineDash([]); }
  if(d&&d.kind==='field'){ g.setLineDash([5,5]); g.strokeStyle='rgba(255,140,90,0.5)'; g.lineWidth=1.5;
    if(d.r>=30){ g.beginPath(); g.moveTo(d.x,d.y); g.lineTo(d.x2!=null?d.x2:d.x, d.y2!=null?d.y2:d.y); g.stroke(); }
    else { g.beginPath(); g.arc(d.x,d.y,Math.max(22,d.r),0,TAU); g.stroke(); }
    g.setLineDash([]); }
}

// gravity-well fabric — classic spacetime curvature: vertices funnel toward + sink
// into each mass, displacement ∝ mass / distance². Anchors carry the most mass → deepest pits.
const MESH_GX=36, MESH_GY=22;
function drawMesh(g, masses){
  const colW=W/MESH_GX, rowH=H/MESH_GY;
  const pts=new Array(MESH_GY+1);
  for(let j=0;j<=MESH_GY;j++){ const row=new Array(MESH_GX+1);
    for(let i=0;i<=MESH_GX;i++){
      let x=i*colW, y=j*rowH, sink=0;
      for(let k=0;k<masses.length;k++){ const ms=masses[k];
        const dx=ms.x-x, dy=ms.y-y; const d2=dx*dx+dy*dy+1500; const d=Math.sqrt(d2);
        const w=ms.m*46000/d2;                 // 1/distance² falloff, scaled by mass
        const pull=Math.min(d-1.5, w);          // funnel toward the mass (capped before the center)
        x+=dx/d*pull; y+=dy/d*pull;
        sink+=Math.min(90, ms.m*6000/d2);       // downward perspective depression
      }
      row[i]={x, y:y+sink};
    } pts[j]=row;
  }
  g.strokeStyle='rgba(0,212,170,0.15)'; g.lineWidth=1;
  for(let j=0;j<=MESH_GY;j++){ g.beginPath(); for(let i=0;i<=MESH_GX;i++){ const p=pts[j][i]; i?g.lineTo(p.x,p.y):g.moveTo(p.x,p.y);} g.stroke(); }
  for(let i=0;i<=MESH_GX;i++){ g.beginPath(); for(let j=0;j<=MESH_GY;j++){ const p=pts[j][i]; j?g.lineTo(p.x,p.y):g.moveTo(p.x,p.y);} g.stroke(); }
}

/* ---- Mode 1: Gravity Synth (overhaul) ---- */
function modeGravity(restore){
  let objs=[];
  const sel={ type:'roamer', size:'med', inst:'synth' };
  const SIZE={ small:{m:1,r:6}, med:{m:2.4,r:9}, large:{m:4.5,r:13} };
  const pitchFromY=y=>34+Math.round((1-clamp(y,0,H)/H)*40);
  function addObj(x,y,type,size,inst){
    const sz=SIZE[size]||SIZE.med; const v=instVoice(inst); v.setFreq(mtof(pitchFromY(y)));
    objs.push({x,y,vx:0,vy:0,type,size,inst,mass:sz.m*(type==='anchor'?3:1),r:sz.r*(type==='anchor'?1.3:1),v,trail:[],ph:rand(0,TAU)});
  }
  if(restore&&restore.objs) restore.objs.forEach(o=>{ addObj(o.x*W,o.y*H,o.type||'roamer',o.size||'med',o.inst||'synth');
    const last=objs[objs.length-1]; last.vx=o.vx||0; last.vy=o.vy||0; });
  function near(x,y){ let bi=-1,bd=1e9; objs.forEach((o,i)=>{ const d=(o.x-x)**2+(o.y-y)**2; const rr=Math.max(20,o.r+10); if(d<bd&&d<rr*rr){bd=d;bi=i;} }); return bi; }
  return {
    kind:'gravity', displayName:'Gravity Synth', mode:'gravity', sel,
    init(){ ensureAudio(); },
    teardown(){ objs.forEach(o=>o.v.stop()); objs=[]; },
    // orbs are placed by clicking and then move purely under physics — no drag
    onDown(x,y,btn){ if(btn===2){ const i=near(x,y); if(i>=0){objs[i].v.stop();objs.splice(i,1);} return; }
      addObj(x,y,sel.type,sel.size,sel.inst); started(); },
    onDelete(x,y){ const i=near(x,y); if(i>=0){ objs[i].v.stop(); objs.splice(i,1); return true; } return false; },
    onPause(p){ objs.forEach(o=>o.v.setGain(0)); },
    draw(g,t,dt){ g.fillStyle='#04060c'; g.fillRect(0,0,W,H);
      drawMesh(g, objs.map(o=>({x:o.x,y:o.y,m:o.mass})));
      drawWalls(g);
      const live=!paused;
      // roamers attract each other + anchors, integrate, and bounce ONLY off walls + edges
      // (orbs pass through each other — no orb-orb collision)
      for(let i=0;i<objs.length;i++){ const a=objs[i]; if(a.type==='anchor')continue;
        if(live){ for(let j=0;j<objs.length;j++){ if(i===j)continue; const b=objs[j];
            const dx=b.x-a.x,dy=b.y-a.y; const d2=dx*dx+dy*dy+520; const d=Math.sqrt(d2); const F=135*b.mass/d2; a.vx+=F*dx/d; a.vy+=F*dy/d; }
          a.vx*=0.992; a.vy*=0.992; a.px=a.x; a.py=a.y; a.x+=a.vx*dt*34; a.y+=a.vy*dt*34;
          a._wallHit=false; reflectOffWalls(a);
          if(a.x<a.r){a.x=a.r;a.vx*=-0.75;} if(a.x>W-a.r){a.x=W-a.r;a.vx*=-0.75;}
          if(a.y<a.r){a.y=a.r;a.vy*=-0.75;} if(a.y>H-a.r){a.y=H-a.r;a.vy*=-0.75;}
          a.v.setFreq(mtof(pitchFromY(a.y))); }
        a.trail.push({x:a.x,y:a.y}); if(a.trail.length>48)a.trail.shift();
      }
      objs.forEach(o=>{ o.ph+=dt*2; const col=instColor(o.inst);
        if(o.trail.length>1){ g.lineWidth=1.4; for(let k=1;k<o.trail.length;k++){ g.globalAlpha=(k/o.trail.length)*0.5; g.strokeStyle=col; g.beginPath(); g.moveTo(o.trail[k-1].x,o.trail[k-1].y); g.lineTo(o.trail[k].x,o.trail[k].y); g.stroke(); } g.globalAlpha=1; }
        if(o.type==='anchor'){ o.v.setGain(paused?0:0.05); o.v.setPan((o.x/W-0.5)*1.2);
          const pr=o.r+6+Math.sin(o.ph)*4; g.strokeStyle=col; g.globalAlpha=0.5; g.lineWidth=2; g.beginPath(); g.arc(o.x,o.y,pr,0,TAU); g.stroke();
          g.globalAlpha=0.22; g.beginPath(); g.arc(o.x,o.y,pr+9,0,TAU); g.stroke(); g.globalAlpha=1;
          g.shadowBlur=26; g.shadowColor=col; g.fillStyle='#04060c'; g.beginPath(); g.arc(o.x,o.y,o.r,0,TAU); g.fill();
          g.lineWidth=2.5; g.strokeStyle=col; g.beginPath(); g.arc(o.x,o.y,o.r,0,TAU); g.stroke(); g.shadowBlur=0;
        } else { const sp=Math.min(1,Math.hypot(o.vx,o.vy)/6); o.v.setGain(paused?0:0.035+sp*0.075); o.v.setPan((o.x/W-0.5)*1.3);
          g.shadowBlur=16; g.shadowColor=col; g.fillStyle=col; g.beginPath(); g.arc(o.x,o.y,o.r,0,TAU); g.fill(); g.shadowBlur=0; }
      });
    },
    serialize(){ return {objs:objs.map(o=>({x:o.x/W,y:o.y/H,vx:o.vx,vy:o.vy,type:o.type,size:o.size,inst:o.inst}))}; }
  };
}

/* ---- Mode 2: Paint to Play (instruments + eraser + clear) ---- */
function modePaint(restore){
  let strokes=[]; let cur=null; let instIdx=0; let playhead=0; let eraser=false; let erasing=false; let loopN=0;
  if(restore&&restore.strokes) strokes=restore.strokes.map(s=>({inst:s.inst||'synth',pts:s.pts.map(p=>({x:p.x*W,y:p.y*H,w:p.w})),hit:{}}));
  function eraseAt(x,y){ let hit=false; for(let i=strokes.length-1;i>=0;i--){ if(strokes[i].pts.some(p=>Math.hypot(p.x-x,p.y-y)<18)){ strokes.splice(i,1); hit=true; } } return hit; }
  return {
    kind:'paint', displayName:'Paint to Play', mode:'paint', step:0,
    init(){ ensureAudio(); },
    teardown(){},
    setInst(i){ instIdx=i; eraser=false; }, curInst(){ return INST_IDS[instIdx]; },
    toggleEraser(){ eraser=!eraser; return eraser; }, eraserOn(){ return eraser; }, clearAll(){ strokes=[]; },
    onDown(x,y){ if(eraser){ erasing=true; eraseAt(x,y); return; } cur={inst:INST_IDS[instIdx],pts:[{x,y,w:6}],hit:{}}; strokes.push(cur); started(); },
    onDelete(x,y){ return eraseAt(x,y); },
    onMove(x,y){ if(erasing){ eraseAt(x,y); return; } if(cur){ const last=cur.pts[cur.pts.length-1]; const sp=Math.hypot(x-last.x,y-last.y); cur.pts.push({x,y,w:clamp(10-sp*0.12,2,12)}); } },
    onUp(){ cur=null; erasing=false; },
    draw(g,t,dt){ g.fillStyle='#070a12'; g.fillRect(0,0,W,H);
      g.strokeStyle='rgba(255,255,255,0.04)'; g.lineWidth=1; for(let x=0;x<W;x+=44){g.beginPath();g.moveTo(x,0);g.lineTo(x,H);g.stroke();}
      drawWalls(g);
      if(!paused){ playhead+=dt*W*0.16; if(playhead>=W){ playhead-=W; loopN++; strokes.forEach(s=>s.hit={}); } }
      const px=playhead;
      strokes.forEach(s=>{ const col=instColor(s.inst); g.lineCap='round'; g.lineJoin='round';
        for(let k=1;k<s.pts.length;k++){ const p=s.pts[k],q=s.pts[k-1]; const near=Math.abs(p.x-px)<7;
          g.strokeStyle=col; g.globalAlpha=near?0.95:0.62; g.lineWidth=p.w*(near?1.6:1); if(near){g.shadowBlur=14;g.shadowColor=col;}
          g.beginPath(); g.moveTo(q.x,q.y); g.lineTo(p.x,p.y); g.stroke(); g.shadowBlur=0;
          if(!paused && p.x>=px-6 && p.x<px+W*0.16*dt+3){ const b=Math.floor(p.x/10); if(s.hit[b]!==loopN){ s.hit[b]=loopN; const midi=Math.round(lerp(36,84,1-p.y/H)); instNote(s.inst,midi,Audio.ctx.currentTime+0.02,clamp(p.w/8,0.4,1.3)); } }
        } g.globalAlpha=1; });
      g.strokeStyle='rgba(255,255,255,0.85)'; g.lineWidth=2; g.shadowBlur=14; g.shadowColor='#fff'; g.beginPath(); g.moveTo(px,0); g.lineTo(px,H); g.stroke(); g.shadowBlur=0;
      if(eraser){ g.strokeStyle='rgba(255,84,112,0.85)'; g.lineWidth=1.5; g.beginPath(); g.arc(pointer.x,pointer.y,18,0,TAU); g.stroke(); }
    },
    serialize(){ return {strokes:strokes.map(s=>({inst:s.inst,pts:s.pts.map(p=>({x:p.x/W,y:p.y/H,w:p.w}))}))}; }
  };
}

/* ---- Mode 3: Particle Storm (reverse gravity / repulsion overhaul) ---- */
function modeParticles(restore){
  let parts=[]; let anchors=[]; let holding=false, hx=0,hy=0; let instIdx=0;
  const AS={small:60,med:110,large:180};
  function spawn(x,y,n,inst){ const col=instColor(inst);
    for(let i=0;i<n;i++){ const a=rand(0,TAU),s=rand(70,260); parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,inst,col,r:rand(2.5,4.5)}); } }
  function snd(p,wall){ const sp=Math.min(1,Math.hypot(p.vx,p.vy)/300); const midi=Math.round(lerp(42,84,sp));
    instNote(p.inst, wall?midi+7:midi, Audio.ctx.currentTime+0.004, wall?0.5:0.3, {dur:0.18,pan:(p.x/W-0.5)*1.2}); }
  if(restore){ instIdx=restore.instIdx||0;
    (restore.parts||[]).forEach(p=>parts.push({x:p.x*W,y:p.y*H,vx:p.vx,vy:p.vy,inst:p.inst||'synth',col:instColor(p.inst||'synth'),r:p.r||3}));
    (restore.anchors||[]).forEach(a=>anchors.push({x:a.x*W,y:a.y*H,size:a.size||'med',ph:0})); }
  return {
    kind:'particles', displayName:'Particle Storm', mode:'particles',
    init(){ ensureAudio(); },
    teardown(){ parts=[]; anchors=[]; },
    curInst(){ return INST_IDS[instIdx]; }, setInst(i){ instIdx=i; }, cycleInst(){ instIdx=(instIdx+1)%INST_IDS.length; return INST_IDS[instIdx]; },
    onDown(x,y,btn){ if(btn===2){ const i=anchors.findIndex(a=>Math.hypot(a.x-x,a.y-y)<20); if(i>=0)anchors.splice(i,1); return; }
      spawn(x,y,18,INST_IDS[instIdx]); holding=true; hx=x; hy=y; started(); },
    onAnchor(x,y){ anchors.push({x,y,size:'med',ph:0}); started(); },
    onDelete(x,y){ const i=anchors.findIndex(a=>Math.hypot(a.x-x,a.y-y)<22); if(i>=0){anchors.splice(i,1);return true;}
      const fi=fieldAt(x,y); if(fi>=0){Creator.fields.splice(fi,1);return true;} return false; },
    onMove(x,y){ hx=x;hy=y; },
    onUp(){ holding=false; },
    onPause(p){},
    draw(g,t,dt){ g.fillStyle='rgba(5,7,14,0.20)'; g.fillRect(0,0,W,H);
      drawWalls(g);
      if(holding && !paused && Math.random()<0.5) spawn(hx,hy,4,INST_IDS[instIdx]);
      if(parts.length>280) parts.splice(0,parts.length-280);
      const st=paused?0:dt;
      if(!paused) for(let i=0;i<parts.length;i++){ const p=parts[i];
        for(let j=i+1;j<parts.length;j++){ const b=parts[j]; const dx=b.x-p.x,dy=b.y-p.y; const d2=dx*dx+dy*dy; if(d2<4800&&d2>1){ const d=Math.sqrt(d2); const F=850/d2; const ux=dx/d,uy=dy/d; p.vx-=F*ux;p.vy-=F*uy;b.vx+=F*ux;b.vy+=F*uy; } }
        anchors.forEach(a=>{ const dx=p.x-a.x,dy=p.y-a.y; const d2=dx*dx+dy*dy+200; const d=Math.sqrt(d2); const F=AS[a.size]*820/d2; p.vx+=dx/d*F*dt; p.vy+=dy/d*F*dt; });
        Creator.fields.forEach(f=>{
          if(f.kind==='line'){ const wx=f.x2-f.x1,wy=f.y2-f.y1,len2=wx*wx+wy*wy||1; const tt=clamp(((p.x-f.x1)*wx+(p.y-f.y1)*wy)/len2,0,1);
            const cx=f.x1+tt*wx, cy=f.y1+tt*wy; const dx=p.x-cx,dy=p.y-cy; const d=Math.hypot(dx,dy); const TH=58;
            if(d<TH&&d>1){ const F=(1-d/TH)*360; p.vx+=dx/d*F*dt; p.vy+=dy/d*F*dt; } }
          else { const dx=p.x-f.x,dy=p.y-f.y; const d=Math.hypot(dx,dy); if(d<f.r&&d>1){ const F=(1-d/f.r)*300; p.vx+=dx/d*F*dt; p.vy+=dy/d*F*dt; } }
        });
        const sp2=p.vx*p.vx+p.vy*p.vy, MX=520; if(sp2>MX*MX){ const s=MX/Math.sqrt(sp2); p.vx*=s; p.vy*=s; }  // clamp so walls catch fast particles
        p.px=p.x; p.py=p.y; p.x+=p.vx*st; p.y+=p.vy*st; p.vx*=0.991; p.vy*=0.991;
        p._wallHit=false; reflectOffWalls(p); if(p._wallHit)snd(p,true);
        if(p.x<3){p.x=3;p.vx*=-0.9;snd(p,true);} if(p.x>W-3){p.x=W-3;p.vx*=-0.9;snd(p,true);}
        if(p.y<3){p.y=3;p.vy*=-0.9;snd(p,true);} if(p.y>H-3){p.y=H-3;p.vy*=-0.9;snd(p,true);}
      }
      anchors.forEach(a=>{ a.ph+=dt*1.6; const ph=a.ph%1; const rr=18+ph*48; g.strokeStyle=`rgba(255,120,80,${0.42*(1-ph)})`; g.lineWidth=2; g.beginPath(); g.arc(a.x,a.y,rr,0,TAU); g.stroke();
        g.shadowBlur=18; g.shadowColor='#ff8a50'; g.fillStyle='#ff8a50'; g.globalAlpha=0.85; g.beginPath(); g.arc(a.x,a.y,7,0,TAU); g.fill(); g.globalAlpha=1; g.shadowBlur=0; });
      parts.forEach(p=>{ g.shadowBlur=9; g.shadowColor=p.col; g.fillStyle=p.col; g.globalAlpha=0.9; g.beginPath(); g.arc(p.x,p.y,p.r,0,TAU); g.fill(); }); g.shadowBlur=0; g.globalAlpha=1;
    },
    serialize(){ return {instIdx, parts:parts.slice(0,200).map(p=>({x:p.x/W,y:p.y/H,vx:p.vx,vy:p.vy,inst:p.inst,r:p.r})), anchors:anchors.map(a=>({x:a.x/W,y:a.y/H,size:a.size}))}; }
  };
}

/* ---- Mode 4: Constellation (instruments + drag-repitch + ripple) ---- */
function modeConstellation(restore){
  let stars=[]; let edges=[]; let sel=-1; let dragIdx=-1; let loopMs=620; let step=0; let lastStep=0; let active=-1; let lit=0; let instIdx=0;
  let bg=[]; for(let i=0;i<140;i++)bg.push({x:Math.random(),y:Math.random(),s:rand(0.3,1),tw:rand(0,TAU)});
  const pitchFromY=y=>40+Math.round((1-clamp(y,0,H)/H)*40);
  function addStar(x,y,inst){ const id=inst||INST_IDS[instIdx]; const hum=instVoice(id); hum.setFreq(mtof(pitchFromY(y))); hum.setGain(0.01); stars.push({x,y,inst:id,hum,tw:rand(0,TAU)}); }
  if(restore){ instIdx=restore.instIdx||0; (restore.stars||[]).forEach(s=>addStar(s.x*W,s.y*H,s.inst)); edges=(restore.edges||[]).map(e=>e.slice()); if(restore.loopMs)loopMs=restore.loopMs; }
  function near(x,y){ let bi=-1,bd=1e9; stars.forEach((s,i)=>{const d=(s.x-x)**2+(s.y-y)**2; if(d<bd&&d<500){bd=d;bi=i;}}); return bi; }
  function edgeAt(x,y){ for(let i=edges.length-1;i>=0;i--){ const a=stars[edges[i][0]],b=stars[edges[i][1]]; if(!a||!b)continue;
    const dx=b.x-a.x,dy=b.y-a.y,len2=dx*dx+dy*dy||1; const tt=clamp(((x-a.x)*dx+(y-a.y)*dy)/len2,0,1); const cx=a.x+tt*dx,cy=a.y+tt*dy; if(Math.hypot(x-cx,y-cy)<10)return i; } return -1; }
  return {
    kind:'constellation', displayName:'Constellation', mode:'constellation',
    init(){ ensureAudio(); },
    teardown(){ stars.forEach(s=>s.hum.stop()); stars=[]; edges=[]; },
    curInst(){ return sel>=0?stars[sel].inst:INST_IDS[instIdx]; },
    setInst(i){ instIdx=i; if(sel>=0)stars[sel].inst=INST_IDS[i]; },
    onDown(x,y,btn){ const i=near(x,y);
      if(btn===2){ if(i>=0){ stars[i].hum.stop(); stars.splice(i,1); edges=edges.filter(e=>e[0]!==i&&e[1]!==i).map(e=>[e[0]>i?e[0]-1:e[0],e[1]>i?e[1]-1:e[1]]); if(sel===i)sel=-1; } return; }
      if(i>=0){ if(sel<0){ sel=i; instIdx=Math.max(0,INST_IDS.indexOf(stars[i].inst)); } else if(sel!==i){ if(!edges.some(e=>(e[0]===sel&&e[1]===i)||(e[0]===i&&e[1]===sel)))edges.push([sel,i]); sel=-1; } dragIdx=i; }
      else { addStar(x,y); started(); sel=stars.length-1; } },
    onDelete(x,y){ const si=near(x,y); if(si>=0){ stars[si].hum.stop(); stars.splice(si,1); edges=edges.filter(e=>e[0]!==si&&e[1]!==si).map(e=>[e[0]>si?e[0]-1:e[0],e[1]>si?e[1]-1:e[1]]); if(sel===si)sel=-1; return true; }
      const ei=edgeAt(x,y); if(ei>=0){ edges.splice(ei,1); return true; } return false; },
    onMove(x,y){ if(dragIdx>=0){ const s=stars[dragIdx]; s.x=x;s.y=y; s.hum.setFreq(mtof(pitchFromY(y))); } },
    onUp(){ dragIdx=-1; },
    onWheel(d){ loopMs=clamp(loopMs+(d>0?60:-60),160,1500); },
    onPause(p){ stars.forEach(s=>s.hum.setGain(p?0:0.01)); },
    draw(g,t,dt){ g.fillStyle='#05070d'; g.fillRect(0,0,W,H);
      bg.forEach(s=>{ s.tw+=dt*2; const a=0.18+0.14*Math.sin(s.tw); g.fillStyle=`rgba(180,200,255,${a*s.s})`; g.fillRect(s.x*W,s.y*H,s.s*1.4,s.s*1.4); });
      stars.forEach(s=>{ const rg=g.createRadialGradient(s.x,s.y,0,s.x,s.y,55); const c=instColor(s.inst); rg.addColorStop(0,hexA(c,0.10)); rg.addColorStop(1,'rgba(0,0,0,0)'); g.fillStyle=rg; g.fillRect(s.x-55,s.y-55,110,110); });
      drawWalls(g);
      if(!paused && edges.length){ const now=performance.now(); if(now-lastStep>loopMs){ lastStep=now; step=(step+1)%edges.length; const e=edges[step]; active=e[1]; lit=1; const s=stars[e[1]]; if(s)instNote(s.inst,pitchFromY(s.y),Audio.ctx.currentTime+0.01,1,{}); } }
      lit=Math.max(0,lit-dt*2);
      edges.forEach((e,i)=>{ const a=stars[e[0]],b=stars[e[1]]; if(!a||!b)return; const act=i===step;
        g.strokeStyle=act?'rgba(0,212,170,0.85)':'rgba(120,160,210,0.30)'; g.lineWidth=act?2.2:1.1; if(act){g.shadowBlur=12;g.shadowColor='#00d4aa';}
        g.beginPath(); g.moveTo(a.x,a.y); g.lineTo(b.x,b.y); g.stroke(); g.shadowBlur=0;
        if(act && lit>0){ const tt=1-lit; const lx=lerp(a.x,b.x,tt), ly=lerp(a.y,b.y,tt); g.fillStyle='#fff'; g.shadowBlur=10; g.shadowColor='#fff'; g.beginPath(); g.arc(lx,ly,3,0,TAU); g.fill(); g.shadowBlur=0; } });
      stars.forEach((s,i)=>{ s.tw+=dt*3; const c=instColor(s.inst); const activeS=i===active&&lit>0; const seld=i===sel;
        const r=(activeS?9:5)+Math.sin(s.tw)*0.6; g.shadowBlur=activeS?22:8; g.shadowColor=c;
        g.fillStyle=activeS?'#ffffff':c; g.beginPath(); g.arc(s.x,s.y,r,0,TAU); g.fill(); g.shadowBlur=0;
        if(seld){ g.strokeStyle='#fff'; g.lineWidth=1.5; g.beginPath(); g.arc(s.x,s.y,r+5,0,TAU); g.stroke(); } });
    },
    serialize(){ return {instIdx, stars:stars.map(s=>({x:s.x/W,y:s.y/H,inst:s.inst})), edges:edges.map(e=>e.slice()), loopMs}; }
  };
}

const MODES={gravity:modeGravity,paint:modePaint,particles:modeParticles,constellation:modeConstellation};
const MODE_HINTS={
  gravity:'CLICK to place · set TYPE / SIZE / INSTRUMENT below · DRAG to move · SHIFT-drag = walls · RIGHT-CLICK or DELETE removes',
  paint:'DRAW left→right · pick instrument up top · hold E or ERASE to rub out · CLEAR resets · SHIFT-drag = walls',
  particles:'CLICK / HOLD to burst · TAB or dots = instrument · SHIFT-click = anti-anchor · ALT-drag = repulsion field · SHIFT-drag = walls',
  constellation:'CLICK to place · click two stars to connect · DRAG to move & repitch · SCROLL = speed · DELETE removes star / line'};
let curMode='gravity';
function openMode(m,restoreState){
  curMode=m; ensureAudio();
  creatorReset();
  if(restoreState){ (restoreState._walls||[]).forEach(w=>Creator.walls.push({x1:w.x1*W,y1:w.y1*H,x2:w.x2*W,y2:w.y2*H}));
    (restoreState._fields||[]).forEach(f=> f.kind==='line'
      ? Creator.fields.push({kind:'line',x1:f.x1*W,y1:f.y1*H,x2:f.x2*W,y2:f.y2*H})
      : Creator.fields.push({x:f.x*W,y:f.y*H,r:f.r*Math.min(W,H)})); }
  const sc=MODES[m](restoreState);
  setScene(sc, {name: restoreState&&restoreState._name? restoreState._name : sc.displayName, kind:'creator'});
  show('creator');
  document.querySelectorAll('#modetabs button').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));
  $('#hint').textContent=MODE_HINTS[m]; $('#hint').classList.remove('hidden');
  if(m==='paint'){ buildPalette(INSTRUMENTS.map(i=>({c:i.color,name:i.name})),0,i=>sc.setInst(i)); }
  else { $('#palette').classList.add('hidden'); $('#palette').innerHTML=''; }
  $('#creatorBar').classList.remove('hidden');
  Creator.deleteMode=false; $('#cDelete').classList.remove('active');
  updateStopBtn();
  buildCreatorBar(m, sc);
  $('#saveBtn').classList.add('hidden');
  cv.style.pointerEvents='auto';
}
function updateStopBtn(){ const b=$('#cStop'); if(!b)return; b.textContent=paused?'▶ GO':'■ STOP'; b.classList.toggle('active',paused); }
function buildPalette(colors,active,onPick){
  const p=$('#palette'); p.innerHTML=''; p.classList.remove('hidden');
  colors.forEach((c,i)=>{ const s=document.createElement('div'); s.className='swatch'+(i===active?' active':'');
    s.style.background=c.c; s.title=c.name;
    s.onclick=()=>{ onPick(i); p.querySelectorAll('.swatch').forEach((el,k)=>el.classList.toggle('active',k===i)); };
    p.appendChild(s); });
}
function instDotsGroup(getCur,onPick){
  const g=document.createElement('div'); g.className='cgroup'; g.innerHTML='<span class="clabel">Inst</span>';
  INSTRUMENTS.forEach((ins,i)=>{ const d=document.createElement('div'); d.className='cdot'+(getCur()===ins.id?' active':''); d.style.background=ins.color; d.title=ins.name;
    d.onclick=()=>{ onPick(i,ins.id); g.querySelectorAll('.cdot').forEach((el,k)=>el.classList.toggle('active',k===i)); }; g.appendChild(d); });
  return g;
}
function segGroup(label,opts,getCur,onPick){
  const g=document.createElement('div'); g.className='cgroup'; g.innerHTML='<span class="clabel">'+label+'</span>';
  opts.forEach(o=>{ const b=document.createElement('button'); b.className='cseg'+(getCur()===o.v?' active':''); b.textContent=o.t; b.dataset.v=o.v;
    b.onclick=()=>{ onPick(o.v); g.querySelectorAll('.cseg').forEach(el=>el.classList.toggle('active',el.dataset.v===o.v)); }; g.appendChild(b); });
  return g;
}
function buildCreatorBar(m,sc){
  const tools=$('#cTools'); tools.innerHTML='';
  if(m==='gravity'){
    tools.appendChild(segGroup('Type',[{t:'ROAMER',v:'roamer'},{t:'ANCHOR',v:'anchor'}],()=>sc.sel.type,v=>sc.sel.type=v));
    tools.appendChild(segGroup('Size',[{t:'S',v:'small'},{t:'M',v:'med'},{t:'L',v:'large'}],()=>sc.sel.size,v=>sc.sel.size=v));
    tools.appendChild(instDotsGroup(()=>sc.sel.inst,(i,id)=>sc.sel.inst=id));
  } else if(m==='constellation'||m==='particles'){
    tools.appendChild(instDotsGroup(()=>sc.curInst(),(i)=>sc.setInst(i)));
  } else if(m==='paint'){
    const g=document.createElement('div'); g.className='cgroup';
    const er=document.createElement('button'); er.className='cseg'; er.id='cErase'; er.textContent='ERASE'; er.onclick=()=>{ er.classList.toggle('active',sc.toggleEraser()); }; g.appendChild(er);
    const cl=document.createElement('button'); cl.className='cseg'; cl.textContent='CLEAR'; cl.onclick=()=>sc.clearAll(); g.appendChild(cl);
    tools.appendChild(g);
  }
}
function refreshCreatorBar(){ if(scene&&curMode) buildCreatorBar(curMode,scene); }

   =================================================================== */
const LS_TRACKS='studio_tracks', LS_BG='studio_bg';
function getTracks(){ try{return JSON.parse(localStorage.getItem(LS_TRACKS)||'[]');}catch(e){return [];} }
function setTracks(a){ localStorage.setItem(LS_TRACKS,JSON.stringify(a)); }
function snapshot(){ try{ const o=document.createElement('canvas'); o.width=220; o.height=130;
    o.getContext('2d').drawImage(cv,0,0,220,130); return o.toDataURL('image/png'); }catch(e){return '';} }
$('#saveBtn').onclick=()=>openNameModal();
function openNameModal(){ $('#nameInput').value=''; $('#nameModal').classList.remove('hidden'); setTimeout(()=>$('#nameInput').focus(),50); }
function closeNameModal(){ $('#nameModal').classList.add('hidden'); }
$('#nameCancel').onclick=closeNameModal;
$('#nameOk').onclick=doSave;
$('#nameInput').addEventListener('keydown',e=>{ if(e.key==='Enter')doSave(); if(e.key==='Escape')closeNameModal(); e.stopPropagation(); });
function doSave(){ if(!scene||!scene.serialize)return; const name=($('#nameInput').value||'untitled session').slice(0,40);
  const state=scene.serialize();
  state._walls=Creator.walls.map(w=>({x1:w.x1/W,y1:w.y1/H,x2:w.x2/W,y2:w.y2/H}));
  state._fields=Creator.fields.map(f=> f.kind==='line'
    ? {kind:'line',x1:f.x1/W,y1:f.y1/H,x2:f.x2/W,y2:f.y2/H}
    : {x:f.x/W,y:f.y/H,r:f.r/Math.min(W,H)});
  const rec={id:uuid(),name,mode:scene.mode,created:new Date().toISOString(),state,visualSnapshot:snapshot()};
  const a=getTracks(); a.unshift(rec); setTracks(a); closeNameModal(); toast('Saved “'+name+'”'); }

function renderYourTracks(){ const wrap=$('#yourTracks'); const a=getTracks(); wrap.innerHTML='';
  if(!a.length){ wrap.innerHTML='<div class="empty-note">No saved tracks yet — open CREATOR, make something, then SAVE TRACK.</div>'; return; }
  a.forEach(rec=>{ const c=document.createElement('div'); c.className='ycard';
    const d=new Date(rec.created); const ds=d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
    c.innerHTML=`<div class="yt-thumb" style="background-image:url('${rec.visualSnapshot||''}')"></div>
      <div class="yt-b"><div class="yt-name">${escapeHtml(rec.name)}</div>
      <div class="yt-meta">${rec.mode.toUpperCase()} · ${ds}</div>
      <div class="yt-btns"><button data-a="play">PLAY</button><button data-a="bg">SET AS BG</button><button data-a="del" class="danger">DELETE</button></div></div>`;
    c.querySelector('[data-a="play"]').onclick=()=>{ const st=Object.assign({},rec.state,{_name:rec.name}); openMode(rec.mode,st); };
    c.querySelector('[data-a="bg"]').onclick=()=>{ localStorage.setItem(LS_BG,JSON.stringify({type:'creation',id:rec.id,name:rec.name})); toast('“'+rec.name+'” set as hub background'); };
    c.querySelector('[data-a="del"]').onclick=()=>{ setTracks(getTracks().filter(x=>x.id!==rec.id)); renderYourTracks(); };
    wrap.appendChild(c); });
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

let toastTimer=null;
function toast(msg){ const el=$('#toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2200); }

/* preset "set as bg" via long-press not required; add small control: hold on preset card? Keep simple:
   presets can be set as bg from the preset playing screen via key 'b'. */

/* ===================================================================
   INPUT
   =================================================================== */
let toolDrag=null, dragMoved=false, downSX=0, downSY=0;
cv.addEventListener('pointerdown',e=>{ if(view!=='creator' && !(scene&&scene.kind==='preset')) return;
  ensureAudio(); const p=canvasPos(e); pointer.down=true;pointer.x=p.x;pointer.y=p.y;pointer.btn=e.button;
  if(scene&&scene.kind==='preset'){ togglePause(); return; }
  if(!scene) return;
  downSX=p.x; downSY=p.y; dragMoved=false;
  // delete mode (left click): walls/fields first, then the mode's objects
  if(Creator.deleteMode && e.button===0){ const wi=wallAt(p.x,p.y); if(wi>=0){Creator.walls.splice(wi,1);return;} if(scene.onDelete)scene.onDelete(p.x,p.y); return; }
  // SHIFT-drag draws a wall (all modes); ALT-drag draws a repulsion field (particles)
  if(e.button===0 && e.shiftKey){ toolDrag={kind:'wall',x1:p.x,y1:p.y,x2:p.x,y2:p.y}; Creator.draft=toolDrag; return; }
  if(e.button===0 && e.altKey && curMode==='particles'){ toolDrag={kind:'field',x:p.x,y:p.y,x2:p.x,y2:p.y,r:0}; Creator.draft=toolDrag; return; }
  if(scene.onDown) scene.onDown(p.x,p.y,e.button,{shift:e.shiftKey,alt:e.altKey});
});
cv.addEventListener('pointermove',e=>{ if(!pointer.down)return; const p=canvasPos(e); pointer.x=p.x;pointer.y=p.y;
  if(Math.hypot(p.x-downSX,p.y-downSY)>4)dragMoved=true;
  if(toolDrag){ if(toolDrag.kind==='wall'){toolDrag.x2=p.x;toolDrag.y2=p.y;} else {toolDrag.x2=p.x;toolDrag.y2=p.y;toolDrag.r=Math.hypot(p.x-toolDrag.x,p.y-toolDrag.y);} Creator.draft=toolDrag; return; }
  if(scene&&scene.onMove) scene.onMove(p.x,p.y); });
window.addEventListener('pointerup',()=>{
  if(toolDrag){ if(toolDrag.kind==='wall'){ if(dragMoved) Creator.walls.push({x1:toolDrag.x1,y1:toolDrag.y1,x2:toolDrag.x2,y2:toolDrag.y2});
      else if(curMode==='particles'&&scene&&scene.onAnchor) scene.onAnchor(toolDrag.x1,toolDrag.y1); }
    else if(toolDrag.kind==='field'){ // short drag = circular field, long drag (>=30px) = line field
      if(toolDrag.r>=30) Creator.fields.push({kind:'line',x1:toolDrag.x,y1:toolDrag.y,x2:toolDrag.x2,y2:toolDrag.y2});
      else Creator.fields.push({x:toolDrag.x,y:toolDrag.y,r:Math.max(24,toolDrag.r)}); }
    toolDrag=null; Creator.draft=null; pointer.down=false; return; }
  pointer.down=false; if(scene&&scene.onUp)scene.onUp(); });
cv.addEventListener('contextmenu',e=>{ if(view==='creator'){ e.preventDefault(); const p=canvasPos(e); if(scene&&scene.onDown)scene.onDown(p.x,p.y,2); } });
cv.addEventListener('wheel',e=>{ if(scene&&scene.onWheel){ e.preventDefault(); scene.onWheel(e.deltaY); } },{passive:false});

window.addEventListener('keydown',e=>{
  if(e.target&&e.target.tagName==='INPUT')return;
  if(e.code==='Space'){ e.preventDefault(); togglePause(); }
  else if(e.code==='Escape'){ if(view==='creator'&&Creator.deleteMode){ Creator.deleteMode=false; $('#cDelete').classList.remove('active'); } else toLanding(); }
  else if(e.code==='Tab' && view==='creator' && curMode==='particles' && scene&&scene.cycleInst){ e.preventDefault(); scene.cycleInst(); refreshCreatorBar(); }
  else if((e.key==='e'||e.key==='E') && view==='creator' && curMode==='paint' && scene&&scene.toggleEraser){ const on=scene.toggleEraser(); const b=document.getElementById('cErase'); if(b)b.classList.toggle('active',on); }
  else if(e.key==='b'||e.key==='B'){ if(scene&&scene.kind==='preset'){ localStorage.setItem(LS_BG,JSON.stringify({type:'preset',id:scene.id,name:scene.displayName})); toast('“'+scene.displayName+'” set as hub background'); } }
});
$('#cStop').onclick=()=>togglePause();
$('#cDelete').onclick=()=>{ Creator.deleteMode=!Creator.deleteMode; $('#cDelete').classList.toggle('active',Creator.deleteMode); };

/* nav */
document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>{ ensureAudio(); show(b.dataset.go); if(b.dataset.go==='creator')openMode('gravity'); });
document.querySelectorAll('[data-back]').forEach(b=>b.onclick=()=>toLanding());
$('#prevT').onclick=()=>playPreset(presetIndex-1);
$('#nextT').onclick=()=>playPreset(presetIndex+1);
document.querySelectorAll('#modetabs button').forEach(b=>b.onclick=()=>openMode(b.dataset.mode));
function toLanding(){ show('landing'); setPresetChrome(false); $('#landing').classList.remove('hidden'); cv.style.pointerEvents='none';
  // keep audio playing in background per spec (widget persists). To fully stop, user mutes.
}

/* chrome auto-hide on idle */
let idleTimer=null;
function pokeChrome(){ document.querySelectorAll('.modetabs,.phasebar,.navarrows,.palette,#hint,#creatorBack,#presetBack,#saveBtn').forEach(el=>el.classList.remove('chrome-hidden'));
  clearTimeout(idleTimer); idleTimer=setTimeout(()=>{ if(scene) document.querySelectorAll('.phasebar,.navarrows,#hint').forEach(el=>el.classList.add('chrome-hidden')); },2600); }
window.addEventListener('pointermove',pokeChrome); window.addEventListener('pointerdown',pokeChrome);

/* ===================================================================
   BACKGROUND MUSIC (iframe message API)
   =================================================================== */
window.addEventListener('message',e=>{ const d=e.data||{};
  if(d.cmd==='bg'){ Audio.bg=true; ensureAudio(); startById(d.trackId||d.id); applyVol(); }
  else if(d.cmd==='pause'){ setPaused(true); }
  else if(d.cmd==='resume'){ ensureAudio(); setPaused(false); }
  else if(d.cmd==='mute'){ Audio.muted=!!d.value; applyVol(); }
  else if(d.cmd==='vol'){ Audio.userVol=clamp(d.value,0,1); applyVol(); }
});
function startById(id){ const pre=PRESETS.find(p=>p.id===id); if(pre){ setScene(pre.make(),{name:pre.name,kind:'preset'}); return; }
  const rec=getTracks().find(t=>t.id===id); if(rec){ const st=Object.assign({},rec.state,{_name:rec.name}); curMode=rec.mode; setScene(MODES[rec.mode](st),{name:rec.name,kind:'creator'}); } }

/* ===================================================================
   BOOT
   =================================================================== */
renderPresetGrid();
show('landing');
// resume audio on first gesture anywhere
['pointerdown','keydown','touchstart'].forEach(ev=>window.addEventListener(ev,function once(){ ensureAudio(); },{once:true}));

// when embedded (hub bg iframe), stream 16-band frequency data to the parent ~30fps for the mini visualizer
if(window.parent && window.parent!==window){
  let fb=null;
  setInterval(()=>{ if(!Audio.analyser) return;
    if(!fb||fb.length!==Audio.analyser.frequencyBinCount) fb=new Uint8Array(Audio.analyser.frequencyBinCount);
    Audio.analyser.getByteFrequencyData(fb);
    const bins=16, out=new Array(bins), N=Math.min(fb.length,360);
    for(let i=0;i<bins;i++){ let s=0,c=0; const a=(i/bins*N)|0, b=((i+1)/bins*N)|0; for(let k=a;k<b;k++){s+=fb[k];c++;} out[i]=c?Math.round(s/c):0; }
    if(Audio.muted||Audio.playPaused) for(let i=0;i<bins;i++)out[i]=0;
    try{ window.parent.postMessage({type:'vizData', data:out}, '*'); }catch(e){}
  }, 33);
}
})();
</script>
